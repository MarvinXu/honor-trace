<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备移动轨迹</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#map{height:100%;width:100%}
#panel{position:fixed;top:12px;right:12px;z-index:1000;background:rgba(255,255,255,.95);border-radius:10px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,.15);width:360px;font-size:13px;line-height:1.8;max-height:calc(100vh - 24px);overflow-y:auto}
#panel h3{margin:0 0 8px;font-size:15px;color:#333}
#panel .stat{color:#666}
#panel .stat span{color:#222;font-weight:600}
.legend{margin:6px 0;font-size:12px}
.legend-item{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 4px;border-radius:4px;transition:background .15s}
.legend-item:hover{background:#f0f0f0}
.legend-item.active{background:#e8f4fd}
.swatch{width:12px;height:12px;border-radius:3px}
.legend-info{color:#888;font-size:11px;margin-left:auto}
.ctrl{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:opacity .2s}
.btn:hover{opacity:.8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#3498db;color:#fff}
.btn-success{background:#27ae60;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}
.btn-warning{background:#f39c12;color:#fff}
#panel .note{font-size:11px;color:#999;margin-top:4px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:2000;background:rgba(0,0,0,.8);color:#fff;padding:8px 20px;border-radius:6px;font-size:13px;transition:opacity .3s;opacity:0;pointer-events:none}
#toast.show{opacity:1}
.leaflet-popup-content{margin:8px 12px;font-size:13px;line-height:1.6;min-width:180px}
/* AMap 弹窗用 isCustom 完全自定义，无需覆盖默认样式 */
.amap-info *{outline:none}
.filter-row{display:flex;gap:4px;align-items:center;margin:4px 0;font-size:12px}
.filter-row input{border:1px solid #ddd;border-radius:4px;padding:2px 6px;font-size:12px;flex:1;min-width:0}
#pointList{margin-top:6px;max-height:220px;overflow-y:auto;font-size:12px}
.point-item{cursor:pointer;padding:3px 6px;border-radius:4px;border-bottom:1px solid #eee}
.point-item:hover{background:#e8f4fd}
.point-item.active{background:#d4edda;font-weight:600}
.point-item .pt-time{color:#333;font-weight:600;font-size:11px}
.point-item .pt-addr{color:#888;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h3>设备轨迹 <span id="engLabel" style="font-weight:400;font-size:11px;color:#999"></span></h3>
  <div class="stat">账号: <span id="acctCount">0</span> | 总记录: <span id="totalCount">0</span></div>
  <div class="stat">全局状态: <span id="globalStatus">空闲</span></div>
  <div id="legend"></div>
  <div id="detail" style="display:none;margin:8px 0;padding:8px;background:#f8f9fa;border-radius:6px;font-size:12px;line-height:1.7">
    <div style="font-weight:600;color:#333;margin-bottom:4px">最新定位 <span id="detAccountName" style="font-weight:400;color:#888"></span></div>
    <div>地址: <span id="detAddress" style="color:#555"></span></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <span>坐标: <span id="detCoords" style="color:#555"></span></span>
      <span>精度: <span id="detAccuracy" style="color:#555"></span>m</span>
      <span>电量: <span id="detBattery" style="color:#555"></span>% <span id="detCharging" style="color:#555"></span></span>
    </div>
    <div>网络: <span id="detNetwork" style="color:#555"></span></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <span>SIM: <span id="detSim" style="color:#555"></span></span>
      <span>运营商: <span id="detCarrier" style="color:#555"></span></span>
      <span>锁屏: <span id="detLock" style="color:#555"></span></span>
    </div>
    <div>时间: <span id="detTime" style="color:#555"></span></div>
  </div>
  <div class="ctrl">
    <button class="btn btn-primary" id="btnLocate" onclick="doLocate()">单次定位</button>
    <button class="btn btn-success" id="btnStart" onclick="startRecord()" style="display:none">开始录制</button>
    <button class="btn btn-danger" id="btnStop" onclick="stopRecord()" style="display:none">停止录制</button>
  </div>
  <div class="note">每账号独立颜色 | 最新点大圆标记</div>
  <div id="filterArea">
    <div class="filter-row">
      <span>从</span>
      <input type="datetime-local" id="filterFrom" onchange="applyFilter()">
      <span>至</span>
      <input type="datetime-local" id="filterTo" onchange="applyFilter()">
    </div>
  </div>
  <div id="pointList"></div>
</div>
<div id="toast"></div>
<script>
// ===== AMap security config (plaintext mode) =====
window._AMapSecurityConfig = { securityJsCode: 'd620b7194d70feed855125286200e9f1' }
</script>
<script src="https://webapi.amap.com/maps?v=2.0&key=5250f6cd9ae1ea3685c4b972ee5c2e3f"></script>
<script>
// ===== Map Engine Selection =====
const MAP_ENGINE = new URLSearchParams(location.search).get('map') === 'leaflet' ? 'leaflet' : 'amap'
document.getElementById('engLabel').textContent = '[' + MAP_ENGINE + ']'

// ===== Map Abstraction Layer =====
let map = null
let tileLayerAdded = false

function initMapFromBounds(allBounds) {
  if (allBounds.length === 0) return
  if (MAP_ENGINE === 'leaflet') {
    map = L.map('map', { zoomControl: true })
    // tiles added lazily in fitBounds
  } else {
    const minLat = Math.min(...allBounds.map(p => p[0]))
    const maxLat = Math.max(...allBounds.map(p => p[0]))
    const minLng = Math.min(...allBounds.map(p => p[1]))
    const maxLng = Math.max(...allBounds.map(p => p[1]))
    const lngSpan = maxLng - minLng
    const latSpan = maxLat - minLat
    const maxSpan = Math.max(latSpan, lngSpan / Math.cos((minLat + maxLat) / 2 * Math.PI / 180))
    const zoom = Math.max(7, Math.min(18, Math.round(14 - Math.log2(Math.max(maxSpan, 0.0001) / 0.5))))
    map = new AMap.Map('map', {
      center: [(minLng + maxLng) / 2, (minLat + maxLat) / 2],
      zoom, viewMode: '2D',
    })
  }
}

const Eng = MAP_ENGINE === 'leaflet' ? {
  pos: (p) => p,
  remove: (layer) => {
    if (!map) return
    if (Array.isArray(layer)) { layer.forEach(l => map.removeLayer(l)); return }
    map.removeLayer(layer)
  },
  polyline: (coords, color) => {
    const line = L.polyline(coords, { color, weight: 3, opacity: 0.8 }).addTo(map)
    const decorator = L.polylineDecorator(line, {
      patterns: [{ offset: 30, repeat: 100, symbol: L.Symbol.arrowHead({ pixelSize: 10, polygon: false, pathOptions: { color, weight: 2 } }) }]
    }).addTo(map)
    return [line, decorator]
  },
  circleMarker: (gcj, opts, popupHtml) => {
    const m = L.circleMarker(gcj, {
      radius: opts.radius, color: opts.color, fillColor: opts.fillColor,
      fillOpacity: opts.fillOpacity, weight: opts.weight,
    }).addTo(map)
    m.bindPopup(popupHtml)
    return m
  },
  fitBounds: (allBounds) => {
    if (allBounds.length === 0) return
    if (!tileLayerAdded) {
      L.tileLayer('https://{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        attribution: '&copy; 高德地图',
        subdomains: ['webrd01', 'webrd02', 'webrd03', 'webrd04'],
        maxZoom: 18,
      }).addTo(map)
      tileLayerAdded = true
    }
    map.fitBounds(L.latLngBounds(allBounds).pad(0.15))
  },
  setView: (gcj, zoom) => { if (map) map.setView(gcj, zoom) },
  openPopup: (marker) => { marker.openPopup() },
  jumpToPoint: (key, lat, lng) => {
    const gcj = wgs2gcj(lat, lng)
    map.setView(gcj, 18, { animate: false })
    const m = markersByKey.get(key)
    if (m) setTimeout(() => m.openPopup(), 100)
  },
} : {
  pos: (p) => [p[1], p[0]],
  remove: (layer) => {
    if (!map) return
    map.remove(layer)
  },
  polyline: (coords, color) => {
    const path = coords.map(c => [c[1], c[0]])
    const line = new AMap.Polyline({
      path, strokeColor: color, strokeWeight: 5, strokeOpacity: 0.8, showDir: true,
    })
    map.add(line)
    return line
  },
  circleMarker: (gcj, opts, popupHtml) => {
    const center = [gcj[1], gcj[0]]
    const size = opts.radius * 2
    const marker = new AMap.Marker({
      position: center,
      content: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${opts.fillColor};border:${opts.weight}px solid ${opts.color};opacity:${opts.fillOpacity};box-sizing:border-box"></div>`,
      offset: new AMap.Pixel(-opts.radius, -opts.radius),
    })
    map.add(marker)
    const info = new AMap.InfoWindow({ isCustom: true, offset: [0, -20] })
    const wrap = document.createElement('div')
    wrap.innerHTML = `<div style="background:#fff;border-radius:12px;box-shadow:0 3px 14px rgba(0,0,0,.3);padding:8px 12px;font-size:13px;line-height:1.6;min-width:180px;position:relative">${popupHtml}<span style="position:absolute;right:8px;top:6px;color:#888;font:bold 16px/1 Tahoma,sans-serif;cursor:pointer;z-index:1">×</span></div><div style="position:relative;width:0;height:0;margin:0 auto"><div style="position:absolute;left:50%;top:0;margin-left:-13px;width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:13px solid rgba(0,0,0,.07);pointer-events:none"></div><div style="position:absolute;left:50%;top:0;margin-left:-12px;width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-top:12px solid #fff;pointer-events:none"></div></div>`
    wrap.querySelector('span').onclick = () => info.close()
    info.setContent(wrap)
    marker.on('click', () => info.open(map, center))
    marker._info = info
    return marker
  },
  fitBounds: (_allBounds) => {
    // no-op: map was already created at the correct zoom in initMapFromBounds
  },
  setView: (gcj, zoom) => { if (map) map.setZoomAndCenter(zoom, [gcj[1], gcj[0]]) },
  openPopup: (marker) => {
    if (marker._info) marker._info.open(map, marker.getPosition())
  },
  jumpToPoint: (key, lat, lng) => {
    const gcj = wgs2gcj(lat, lng)
    map.setZoomAndCenter(18, [gcj[1], gcj[0]], true)
    const m = markersByKey.get(key)
    if (m) setTimeout(() => Eng.openPopup(m), 100)
  },
}

// ===== WGS84 → GCJ-02 =====
const GCJ_PI = 3.141592653589793, GCJ_A = 6378245.0, GCJ_EE = 0.00669342162296594323
function isOutOfChina(lat, lng) { return lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271 }
function gcjTransformLat(x, y) {
  let t = -100 + 2*x + 3*y + 0.2*y*y + 0.1*x*y + 0.2*Math.sqrt(Math.abs(x))
  t += (20*Math.sin(6*x*GCJ_PI) + 20*Math.sin(2*x*GCJ_PI)) * 2/3
  t += (20*Math.sin(y*GCJ_PI) + 40*Math.sin(y/3*GCJ_PI)) * 2/3
  t += (160*Math.sin(y/12*GCJ_PI) + 320*Math.sin(y*GCJ_PI/30)) * 2/3
  return t
}
function gcjTransformLon(x, y) {
  let t = 300 + x + 2*y + 0.1*x*x + 0.1*x*y + 0.1*Math.sqrt(Math.abs(x))
  t += (20*Math.sin(6*x*GCJ_PI) + 20*Math.sin(2*x*GCJ_PI)) * 2/3
  t += (20*Math.sin(x*GCJ_PI) + 40*Math.sin(x/3*GCJ_PI)) * 2/3
  t += (150*Math.sin(x/12*GCJ_PI) + 300*Math.sin(x/30*GCJ_PI)) * 2/3
  return t
}
function wgs2gcj(wgsLat, wgsLng) {
  if (isOutOfChina(wgsLat, wgsLng)) return [wgsLat, wgsLng]
  let dLat = gcjTransformLat(wgsLng - 105, wgsLat - 35)
  let dLng = gcjTransformLon(wgsLng - 105, wgsLat - 35)
  const radLat = wgsLat / 180 * GCJ_PI
  let magic = Math.sin(radLat)
  magic = 1 - GCJ_EE * magic * magic
  const sqrtMagic = Math.sqrt(magic)
  dLat = (dLat * 180) / ((GCJ_A * (1 - GCJ_EE)) / (magic * sqrtMagic) * GCJ_PI)
  dLng = (dLng * 180) / (GCJ_A / sqrtMagic * Math.cos(radLat) * GCJ_PI)
  return [wgsLat + dLat, wgsLng + dLng]
}

// ===== Constants & State =====
const ACCT_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#e67e22', '#34495e']
const COLOR_DIM = 0.4
let trailLines = [], dotMarkers = [], lastTotalCount = -1
let selectedPhone = null
let markersByKey = new Map(), dateFrom = null, dateTo = null
let activePointKey = ''
function recordKey(r) { return r.id ?? (r.account + '|' + r.timestamp) }

function acctColor(phone, accounts) {
  const idx = accounts.findIndex(a => a.phone === phone)
  return ACCT_COLORS[idx >= 0 ? idx % ACCT_COLORS.length : 0]
}
function dimColor(hex) {
  const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16)
  return `rgba(${r},${g},${b},${COLOR_DIM})`
}
function formatTime(iso) {
  if (!iso) return '-'
  const d = new Date(iso)
  return `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`
}
function displayTime(r) { return formatTime(r.updatedAt || r.timestamp) }

function clearLayers() {
  dotMarkers.forEach(m => { if (m._info) m._info.close() })
  trailLines.forEach(l => Eng.remove(l)); trailLines = []
  dotMarkers.forEach(m => Eng.remove(m)); dotMarkers = []
  markersByKey = new Map()
}

function renderAll(accounts) {
  const total = accounts.reduce((s, a) => s + a.records.length, 0)
  document.getElementById('acctCount').textContent = accounts.length
  document.getElementById('totalCount').textContent = total

  if (!selectedPhone || !accounts.find(a => a.phone === selectedPhone)) {
    let latest = null
    for (const a of accounts) {
      if (a.lastUpdate && (!latest || a.lastUpdate > latest.lastUpdate)) latest = a
    }
    selectedPhone = latest ? latest.phone : (accounts[0]?.phone || null)
  }
  const selected = accounts.find(a => a.phone === selectedPhone)

  function inRange(r) {
    const t = new Date(r.timestamp)
    if (dateFrom && t < dateFrom) return false
    if (dateTo && t > dateTo) return false
    return true
  }

  // compute bounds from in-range records only
  const allBounds = []
  for (const acct of accounts) {
    for (const d of acct.records) {
      if (!inRange(d)) continue
      allBounds.push(wgs2gcj(d.lat, d.lng))
    }
  }

  // init map lazily — no intermediate zoom-3 flash
  if (!map) initMapFromBounds(allBounds)

  clearLayers()

  for (const acct of accounts) {
    const raw = acct.records.filter(inRange)
    if (raw.length === 0) continue
    const color = acctColor(acct.phone, accounts)

    const coords = raw.map(d => wgs2gcj(d.lat, d.lng))
    const line = Eng.polyline(coords, color)
    trailLines.push(line)

    raw.forEach((d, i) => {
      const isLatest = i === raw.length - 1
      const net = [d.networkType, d.networkName, d.networkSignal].filter(Boolean).join(' ')
      const sim = [d.simNo, d.carrier].filter(Boolean).join(' ')
      const gcj = wgs2gcj(d.lat, d.lng)
      const popupHtml = `<strong>${acct.name} · ${isLatest ? '最新 · ' : ''}${displayTime(d)}</strong><br>
        ${d.lat.toFixed(6)}, ${d.lng.toFixed(6)} (GCJ: ${gcj[0].toFixed(6)}, ${gcj[1].toFixed(6)})<br>
        精度: ${d.accuracy || '-'}m | 电量: ${d.battery || '-'}%${d.isCharging === '是' ? ' ⚡' : ''}<br>
        ${net ? `📡 ${net}<br>` : ''}${sim ? `📱 ${sim}<br>` : ''}${d.address || '地址未知'}
        <br><button class="btn btn-danger" style="margin-top:4px;padding:2px 10px;font-size:11px" onclick="deletePoint(${d.id ?? `'${d.account}','${d.timestamp}'`})">删除此点</button>`
      const m = Eng.circleMarker(gcj, {
        radius: isLatest ? 7 : 5,
        color: isLatest ? color : dimColor(color),
        fillColor: isLatest ? color : dimColor(color),
        fillOpacity: isLatest ? 0.9 : 0.7,
        weight: isLatest ? 2 : 1,
      }, popupHtml)
      dotMarkers.push(m)
      markersByKey.set(recordKey(d), m)
    })
  }

  // legend
  let legendHtml = '<div class="legend">'
  for (const acct of accounts) {
    const color = acctColor(acct.phone, accounts)
    const active = acct.phone === selectedPhone ? ' active' : ''
    const cnt = acct.records.length
    const last = acct.lastUpdate ? formatTime(acct.lastUpdate) : '-'
    legendHtml += `<div class="legend-item${active}" onclick="switchAccount('${acct.phone}')">
      <div class="swatch" style="background:${color}"></div>
      <span>${acct.name}</span>
      <span class="legend-info">${cnt}条 · ${last}</span>
    </div>`
  }
  legendHtml += '</div>'
  document.getElementById('legend').innerHTML = legendHtml

  // detail
  if (selected && selected.records.length > 0) {
    const last = selected.records[selected.records.length - 1]
    const net = [last.networkType, last.networkName, last.networkSignal].filter(Boolean).join(' ')
    document.getElementById('detAccountName').textContent = selected.name
    document.getElementById('detAddress').textContent = last.address || '未知'
    document.getElementById('detCoords').textContent = `${last.lat.toFixed(6)}, ${last.lng.toFixed(6)}`
    document.getElementById('detAccuracy').textContent = last.accuracy || '-'
    document.getElementById('detBattery').textContent = last.battery || '-'
    document.getElementById('detCharging').textContent = last.isCharging === '是' ? '⚡' : ''
    document.getElementById('detNetwork').textContent = net || '-'
    document.getElementById('detSim').textContent = last.simNo || '-'
    document.getElementById('detCarrier').textContent = last.carrier || '-'
    document.getElementById('detLock').textContent = last.isLockScreen || '-'
    document.getElementById('detTime').textContent = displayTime(last)
    document.getElementById('detail').style.display = ''
  } else {
    document.getElementById('detail').style.display = 'none'
  }

  if (allBounds.length > 0) {
    Eng.fitBounds(allBounds)
  }

  renderPointList(selected)
  highlightPoint()
}

function switchAccount(phone) {
  selectedPhone = phone
  localStorage.setItem('selectedPhone', phone)
  if (!window._cachedAccounts) return
  renderAll(window._cachedAccounts)
  autoSelectLatest()
}

async function deletePoint(id, timestamp) {
  if (!confirm('确定删除此点位？')) return
  try {
    let url
    if (id !== undefined && id !== null) {
      url = `/api/record?id=${encodeURIComponent(id)}`
    } else {
      url = `/api/record?account=${encodeURIComponent(selectedPhone)}&timestamp=${encodeURIComponent(timestamp)}`
    }
    const resp = await fetch(url, { method: 'DELETE' })
    const r = await resp.json()
    if (r.ok) { toast('已删除'); await load() }
    else { toast('删除失败: ' + (r.error || ''), 3000) }
  } catch(e) { toast('删除请求失败', 3000) }
}

function applyFilter() {
  const fromVal = document.getElementById('filterFrom').value
  const toVal = document.getElementById('filterTo').value
  dateFrom = fromVal ? new Date(fromVal) : null
  dateTo = toVal ? new Date(toVal) : null
  if (window._cachedAccounts) renderAll(window._cachedAccounts)
}

function jumpToPoint(account, lat, lng, key) {
  selectedPhone = account
  localStorage.setItem('selectedPhone', account)
  activePointKey = key
  Eng.jumpToPoint(activePointKey, lat, lng)
  highlightPoint()
}

function highlightPoint() {
  const prev = document.querySelector('.point-item.active')
  if (prev) prev.classList.remove('active')
  if (!activePointKey) return
  const cur = document.querySelector(`.point-item[data-key="${activePointKey}"]`)
  if (cur) cur.classList.add('active')
}

function renderPointList(selected) {
  const el = document.getElementById('pointList')
  if (!selected || selected.records.length === 0) { el.innerHTML = ''; return }
  let records = selected.records.filter(r => {
    const t = new Date(r.timestamp)
    if (dateFrom && t < dateFrom) return false
    if (dateTo && t > dateTo) return false
    return true
  })
  let html = '<div style="font-weight:600;font-size:12px;margin:4px 0;color:#555">点位列表</div>'
  if (records.length === 0) {
    html += '<div style="color:#999;font-size:12px;text-align:center;padding:12px 0">最近一天没有记录</div>'
    el.innerHTML = html
    return
  }
  for (let i = records.length - 1; i >= 0; i--) {
    const d = records[i]
    const t = displayTime(d)
    const addr = d.address || `${d.lat.toFixed(4)},${d.lng.toFixed(4)}`
    const key = recordKey(d)
    html += `<div class="point-item" data-key="${key}" onclick="jumpToPoint('${selected.phone}',${d.lat},${d.lng},'${key}')">
      <div class="pt-time">${t}</div>
      <div class="pt-addr">${addr}</div>
    </div>`
  }
  el.innerHTML = html
}

async function load() {
  try {
    const resp = await fetch('/api/accounts')
    const accts = await resp.json()
    window._cachedAccounts = accts
    lastTotalCount = accts.reduce((s, a) => s + a.records.length, 0)
    const newest = accts.reduce((latest, a) => {
      const last = a.records[a.records.length - 1]
      return last && (!latest || last.timestamp > latest.timestamp) ? last : latest
    }, null)
    if (newest) {
      const t = new Date(newest.timestamp)
      if (!dateTo || t > dateTo) {
        dateTo = t
        document.getElementById('filterTo').value = toLocalDateTimeStr(t)
      }
    }
    renderAll(accts)
  } catch {}
}

function pad(n) { return n.toString().padStart(2, '0') }

function toLocalDateTimeStr(date) {
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`
}

// init filter defaults
const now = new Date()
const yesterday = new Date(now.getTime() - 86400000)
document.getElementById('filterFrom').value = toLocalDateTimeStr(yesterday)
document.getElementById('filterTo').value = toLocalDateTimeStr(now)
dateFrom = yesterday
dateTo = now

async function doLocate() {
  const btn = document.getElementById('btnLocate')
  btn.disabled = true; btn.textContent = '定位中...'
  document.getElementById('globalStatus').textContent = '定位中'
  const phone = selectedPhone || ''
  try {
    const resp = await fetch('/api/locate?account=' + encodeURIComponent(phone), { method: 'POST' })
    const result = await resp.json()
    if (result.error === 'session_expired') {
      toast('登录过期，后台正在刷新，60秒后自动重试', 3000)
      setTimeout(() => doLocate(), (result.retryAfter || 60) * 1000)
      btn.disabled = false; btn.textContent = '单次定位'
      document.getElementById('globalStatus').textContent = '空闲'
      return
    }
    if (result.ok) {
      toast(`定位成功: ${result.record.accountName} - ${result.record.address || result.record.lat+', '+result.record.lng}`)
      const t = new Date(result.record.timestamp)
      if (!dateTo || t > dateTo) {
        dateTo = t
        document.getElementById('filterTo').value = toLocalDateTimeStr(t)
      }
      await load()
      if (window._cachedAccounts) renderAll(window._cachedAccounts)
    } else {
      toast(`定位失败: ${result.error}`, 3000)
    }
  } catch (e) { toast('请求失败: '+e.message, 3000) }
  btn.disabled = false; btn.textContent = '单次定位'
  document.getElementById('globalStatus').textContent = '空闲'
}

async function startRecord() {
  document.getElementById('globalStatus').textContent = '录制中'
  try {
    const resp = await fetch('/api/record/start', { method: 'POST' })
    const r = await resp.json()
    if (r.ok) {
      document.getElementById('btnStart').style.display = 'none'
      document.getElementById('btnStop').style.display = ''
      toast(`录制已启动，${r.interval/1000}s 轮询 ${window._cachedAccounts?.length || 1} 个账号`)
    }
  } catch {}
}

async function stopRecord() {
  try {
    await fetch('/api/record/stop', { method: 'POST' })
    document.getElementById('btnStart').style.display = ''
    document.getElementById('btnStop').style.display = 'none'
    document.getElementById('globalStatus').textContent = '空闲'
    toast('录制已停止')
  } catch {}
}

function toast(msg, dur) {
  document.getElementById('toast').textContent = msg
  document.getElementById('toast').classList.add('show')
  setTimeout(() => document.getElementById('toast').classList.remove('show'), dur || 2000)
}

let lastKnownModified = ''
let statusPollTimer = null

async function checkStatus() {
  try {
    const resp = await fetch('/api/status')
    const s = await resp.json()
    if (s.recording) {
      document.getElementById('btnStart').style.display = 'none'
      document.getElementById('btnStop').style.display = ''
      document.getElementById('globalStatus').textContent = '录制中'
    } else {
      document.getElementById('btnStart').style.display = ''
      document.getElementById('btnStop').style.display = 'none'
      if (!s.isAnyLocating) document.getElementById('globalStatus').textContent = '空闲'
    }
    if (s.lastModified !== lastKnownModified) {
      lastKnownModified = s.lastModified
      load()
    }
  } catch {}
}

const saved = localStorage.getItem('selectedPhone')
if (saved) selectedPhone = saved

async function autoLocate() {
  const noData = (window._cachedAccounts || []).filter(a =>
    !a.records.some(r => {
      const t = new Date(r.timestamp)
      return (!dateFrom || t >= dateFrom) && (!dateTo || t <= dateTo)
    })
  )
  if (noData.length === 0) return
  for (const a of noData) {
    if (a.phone === selectedPhone) {
      await doLocate()
    } else {
      try {
        await fetch('/api/locate?account=' + encodeURIComponent(a.phone), { method: 'POST' })
      } catch {}
    }
  }
  if (!noData.some(a => a.phone === selectedPhone)) {
    await load()
  }
}

function autoSelectLatest() {
  const acct = (window._cachedAccounts || []).find(a => a.phone === selectedPhone)
  const last = acct?.records?.[acct.records.length - 1]
  if (last) jumpToPoint(selectedPhone, last.lat, last.lng, recordKey(last))
}

statusPollTimer = setInterval(checkStatus, 5000)
checkStatus()
load().then(async () => {
  await autoLocate()
  autoSelectLatest()
})
</script>
