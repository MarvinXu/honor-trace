<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备移动轨迹</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#map{height:100%;width:100%}
#panel{position:fixed;top:12px;right:12px;z-index:1000;background:rgba(255,255,255,.95);border-radius:10px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,.15);width:320px;font-size:13px;line-height:1.8;max-height:calc(100vh - 24px);overflow-y:auto}
#panel h3{margin:0 0 8px;font-size:15px;color:#333}
#panel .stat{color:#666}
#panel .stat span{color:#222;font-weight:600}
.legend{margin:6px 0;font-size:12px}
.legend-item{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 4px;border-radius:4px;transition:background .15s}
.legend-item:hover{background:#f0f0f0}
.legend-item.active{background:#e8f4fd}
.swatch{width:12px;height:12px;border-radius:3px}
.legend-info{color:#888;font-size:11px;margin-left:auto}
.ctrl{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:opacity .2s}
.btn:hover{opacity:.8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#3498db;color:#fff}
.btn-success{background:#27ae60;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}
.btn-warning{background:#f39c12;color:#fff}
#panel .note{font-size:11px;color:#999;margin-top:4px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:2000;background:rgba(0,0,0,.8);color:#fff;padding:8px 20px;border-radius:6px;font-size:13px;transition:opacity .3s;opacity:0;pointer-events:none}
#toast.show{opacity:1}
.leaflet-popup-content{margin:8px 12px;font-size:13px;line-height:1.6;min-width:180px}
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h3>设备轨迹</h3>
  <div class="stat">账号: <span id="acctCount">0</span> | 总记录: <span id="totalCount">0</span></div>
  <div class="stat">全局状态: <span id="globalStatus">空闲</span></div>
  <div id="legend"></div>
  <div id="detail" style="display:none;margin:8px 0;padding:8px;background:#f8f9fa;border-radius:6px;font-size:12px;line-height:1.7">
    <div style="font-weight:600;color:#333;margin-bottom:4px">最新定位 <span id="detAccountName" style="font-weight:400;color:#888"></span></div>
    <div>地址: <span id="detAddress" style="color:#555"></span></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <span>坐标: <span id="detCoords" style="color:#555"></span></span>
      <span>精度: <span id="detAccuracy" style="color:#555"></span>m</span>
      <span>电量: <span id="detBattery" style="color:#555"></span>% <span id="detCharging" style="color:#555"></span></span>
    </div>
    <div>网络: <span id="detNetwork" style="color:#555"></span></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <span>SIM: <span id="detSim" style="color:#555"></span></span>
      <span>运营商: <span id="detCarrier" style="color:#555"></span></span>
      <span>锁屏: <span id="detLock" style="color:#555"></span></span>
    </div>
    <div>时间: <span id="detTime" style="color:#555"></span></div>
  </div>
  <div class="ctrl">
    <button class="btn btn-primary" id="btnLocate" onclick="doLocate()">单次定位</button>
    <button class="btn btn-success" id="btnStart" onclick="startRecord()" style="display:none">开始录制</button>
    <button class="btn btn-danger" id="btnStop" onclick="stopRecord()" style="display:none">停止录制</button>
  </div>
  <div class="note">每账号独立颜色 | 最新点大圆标记</div>
</div>
<div id="toast"></div>
<script>
const map = L.map('map').setView([35, 110], 4)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map)

const ACCT_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#e67e22', '#34495e']
const COLOR_DIM = 0.4

let trailLines = [], dotMarkers = [], lastTotalCount = -1
let selectedPhone = null

// map from phone -> index
function acctColor(phone, accounts) {
  const idx = accounts.findIndex(a => a.phone === phone)
  return ACCT_COLORS[idx >= 0 ? idx % ACCT_COLORS.length : 0]
}

function dimColor(hex) {
  const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16)
  return `rgba(${r},${g},${b},${COLOR_DIM})`
}

function clearLayers() {
  trailLines.forEach(l => map.removeLayer(l)); trailLines = []
  dotMarkers.forEach(m => map.removeLayer(m)); dotMarkers = []
}

function formatTime(iso) {
  if (!iso) return '-'
  const d = new Date(iso)
  return d.toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
}

function renderAll(accounts) {
  clearLayers()
  const total = accounts.reduce((s, a) => s + a.records.length, 0)
  document.getElementById('acctCount').textContent = accounts.length
  document.getElementById('totalCount').textContent = total

  // figure out which account detail to show
  if (!selectedPhone || !accounts.find(a => a.phone === selectedPhone)) {
    // pick the one with the most recent record
    let latest = null
    for (const a of accounts) {
      if (a.lastUpdate && (!latest || a.lastUpdate > latest.lastUpdate)) latest = a
    }
    selectedPhone = latest ? latest.phone : (accounts[0]?.phone || null)
  }
  const selected = accounts.find(a => a.phone === selectedPhone)

  // render each account
  const allBounds = []
  for (const acct of accounts) {
    const raw = acct.records
    if (raw.length === 0) continue
    const color = acctColor(acct.phone, accounts)

    // trail line
    const coords = raw.map(d => [d.lat, d.lng])
    const line = L.polyline(coords, { color, weight: 3, opacity: 0.8 }).addTo(map)
    trailLines.push(line)
    allBounds.push(...coords)

    // dots
    raw.forEach((d, i) => {
      const isLatest = i === raw.length - 1
      const net = [d.networkType, d.networkName, d.networkSignal].filter(Boolean).join(' ')
      const sim = [d.simNo, d.carrier].filter(Boolean).join(' ')
      const m = L.circleMarker([d.lat, d.lng], {
        radius: isLatest ? 7 : 5,
        color: isLatest ? color : dimColor(color),
        fillColor: isLatest ? color : dimColor(color),
        fillOpacity: isLatest ? 0.9 : 0.7,
        weight: isLatest ? 2 : 1,
      }).addTo(map)
      m.bindPopup(`<strong>${acct.name} · ${isLatest ? '最新 · ' : ''}${formatTime(d.timestamp)}</strong><br>
        ${d.lat.toFixed(6)}, ${d.lng.toFixed(6)}<br>
        精度: ${d.accuracy || '-'}m | 电量: ${d.battery || '-'}%${d.isCharging === '是' ? ' ⚡' : ''}<br>
        ${net ? `📡 ${net}<br>` : ''}${sim ? `📱 ${sim}<br>` : ''}${d.address || '地址未知'}`)
      dotMarkers.push(m)
    })
  }

  // legend
  let legendHtml = '<div class="legend">'
  for (const acct of accounts) {
    const color = acctColor(acct.phone, accounts)
    const active = acct.phone === selectedPhone ? ' active' : ''
    const cnt = acct.records.length
    const last = acct.lastUpdate ? formatTime(acct.lastUpdate) : '-'
    legendHtml += `<div class="legend-item${active}" onclick="switchAccount('${acct.phone}')">
      <div class="swatch" style="background:${color}"></div>
      <span>${acct.name}</span>
      <span class="legend-info">${cnt}条 · ${last}</span>
    </div>`
  }
  legendHtml += '</div>'
  document.getElementById('legend').innerHTML = legendHtml

  // detail
  if (selected && selected.records.length > 0) {
    const last = selected.records[selected.records.length - 1]
    const net = [last.networkType, last.networkName, last.networkSignal].filter(Boolean).join(' ')
    document.getElementById('detAccountName').textContent = selected.name
    document.getElementById('detAddress').textContent = last.address || '未知'
    document.getElementById('detCoords').textContent = `${last.lat.toFixed(6)}, ${last.lng.toFixed(6)}`
    document.getElementById('detAccuracy').textContent = last.accuracy || '-'
    document.getElementById('detBattery').textContent = last.battery || '-'
    document.getElementById('detCharging').textContent = last.isCharging === '是' ? '⚡' : ''
    document.getElementById('detNetwork').textContent = net || '-'
    document.getElementById('detSim').textContent = last.simNo || '-'
    document.getElementById('detCarrier').textContent = last.carrier || '-'
    document.getElementById('detLock').textContent = last.isLockScreen || '-'
    document.getElementById('detTime').textContent = formatTime(last.timestamp)
    document.getElementById('detail').style.display = ''
  } else {
    document.getElementById('detail').style.display = 'none'
  }

  // fit bounds
  if (allBounds.length > 0) {
    map.fitBounds(L.latLngBounds(allBounds).pad(0.15))
  }
}

function switchAccount(phone) {
  selectedPhone = phone
  // re-render from cached accounts data
  if (window._cachedAccounts) renderAll(window._cachedAccounts)
}

async function load() {
  try {
    const resp = await fetch('/api/accounts')
    const accts = await resp.json()
    window._cachedAccounts = accts
    const total = accts.reduce((s, a) => s + a.records.length, 0)
    if (total !== lastTotalCount) {
      lastTotalCount = total
      renderAll(accts)
    }
  } catch {}
}

async function doLocate() {
  const btn = document.getElementById('btnLocate')
  btn.disabled = true; btn.textContent = '定位中...'
  document.getElementById('globalStatus').textContent = '定位中'
  const phone = selectedPhone || ''
  try {
    const resp = await fetch('/api/locate?account=' + encodeURIComponent(phone), { method: 'POST' })
    const result = await resp.json()
    if (result.ok) {
      toast(`定位成功: ${result.record.accountName} - ${result.record.address || result.record.lat+', '+result.record.lng}`)
      await load()
    } else {
      toast(`定位失败: ${result.error}`, 3000)
    }
  } catch (e) {
    toast('请求失败: '+e.message, 3000)
  }
  btn.disabled = false; btn.textContent = '单次定位'
  document.getElementById('globalStatus').textContent = '空闲'
}

async function startRecord() {
  document.getElementById('globalStatus').textContent = '录制中'
  try {
    const resp = await fetch('/api/record/start', { method: 'POST' })
    const r = await resp.json()
    if (r.ok) {
      document.getElementById('btnStart').style.display = 'none'
      document.getElementById('btnStop').style.display = ''
      toast(`录制已启动，${r.interval/1000}s 轮询 ${window._cachedAccounts?.length || 1} 个账号`)
    }
  } catch {}
}

async function stopRecord() {
  try {
    await fetch('/api/record/stop', { method: 'POST' })
    document.getElementById('btnStart').style.display = ''
    document.getElementById('btnStop').style.display = 'none'
    document.getElementById('globalStatus').textContent = '空闲'
    toast('录制已停止')
  } catch {}
}

function toast(msg, dur) {
  document.getElementById('toast').textContent = msg
  document.getElementById('toast').classList.add('show')
  setTimeout(() => document.getElementById('toast').classList.remove('show'), dur || 2000)
}

let lastKnownTotal = -1
let statusPollTimer = null

async function checkStatus() {
  try {
    const resp = await fetch('/api/status')
    const s = await resp.json()
    if (s.recording) {
      document.getElementById('btnStart').style.display = 'none'
      document.getElementById('btnStop').style.display = ''
      document.getElementById('globalStatus').textContent = '录制中'
    } else {
      document.getElementById('btnStart').style.display = ''
      document.getElementById('btnStop').style.display = 'none'
      if (!s.isAnyLocating) document.getElementById('globalStatus').textContent = '空闲'
    }
    const total = s.accounts.reduce((sum, a) => sum + a.count, 0)
    if (total !== lastKnownTotal) {
      lastKnownTotal = total
      load()
    }
  } catch {}
}

statusPollTimer = setInterval(checkStatus, 5000)
checkStatus()
load()
</script>
</body>
</html>
